name: Continuous Integration
on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:
  workflow_call:
env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml

  lint:
    name: Lint & Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore packages
        run: dotnet restore src/SourceGit.csproj
      - name: Check formatting
        run: dotnet format src/SourceGit.csproj --verify-no-changes --verbosity diagnostic
      - name: Build with analyzers
        run: dotnet build src/SourceGit.csproj --no-restore --verbosity quiet

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore packages
        run: dotnet restore src/SourceGit.csproj
      - name: NuGet vulnerability audit
        run: |
          OUTPUT=$(dotnet list src/SourceGit.csproj package --vulnerable --include-transitive 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qi "has the following vulnerable packages"; then
            echo "::error::Vulnerable NuGet packages detected"
            exit 1
          fi

  version:
    name: Prepare version string
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Output version string
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
  package:
    needs: [build, version]
    name: Package
    uses: ./.github/workflows/package.yml
    with:
      version: ${{ needs.version.outputs.version }}
